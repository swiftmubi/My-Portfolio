<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mubeen Ahmad — Frontend Developer & Automation Specialist</title>
    <meta name="description" content="Personal portfolio dashboard of Mubeen Ahmad, Frontend Developer & Automation Specialist." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-base text-ink antialiased">
    <script>
      // Applied before React mounts so the correct theme paints immediately
      // (no light-mode flash on a dark-mode visit, or vice versa).
      (function () {
        var saved = localStorage.getItem('portfolio-theme')
        var isDark = saved ? saved === 'dark' : true // dark by default
        document.documentElement.classList.toggle('dark', isDark)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
